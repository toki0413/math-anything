# Codecov 覆盖率配置
# https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        base: auto
        branches:
          - main
          - master
          - develop
        if_not_found: success
        if_ci_failed: error
        informational: false
        only_pulls: false

    patch:
      default:
        target: auto
        threshold: 5%
        base: auto
        branches:
          - main
          - master
          - develop
        if_not_found: success
        if_ci_failed: error
        informational: false
        only_pulls: false

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false

comment:
  layout: "reach,diff,flags,tree,betaprofiling"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

# 忽略的文件和目录
ignore:
  - "tests/**/*"
  - "test_*.py"
  - "*_test.py"
  - "examples/**/*"
  - "docs/**/*"
  - "math-anything/**/setup.py"

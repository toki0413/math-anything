version: '3.8'

services:
  math-anything:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MATH_ANYTHING_CACHE_SIZE=512
      - MATH_ANYTHING_LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6AM UTC

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev]" || pip install -e .

      - name: Run pip-audit
        run: pip-audit --desc

  safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety
          pip install -e ".[dev]" || pip install -e .

      - name: Run safety check
        run: safety check || true  # Don't fail on vulnerabilities, just report

  dependabot:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Dependabot is configured via .github/dependabot.yml"

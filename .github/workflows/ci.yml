name: CI | 持续集成

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format | 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Set up Python | 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages | 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('math-anything/pyproject.toml') }}

      - name: Install package and lint tools | 安装依赖与检查工具
        run: |
          python -m pip install --upgrade pip
          pip install -e "math-anything/[dev]"

      - name: Lint with ruff | 运行 ruff 检查
        working-directory: math-anything
        run: ruff check math_anything/

      - name: Check formatting with ruff | 运行 ruff 格式化检查
        working-directory: math-anything
        run: ruff format --check math_anything/

  type-check:
    name: Type Check | 类型检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Set up Python | 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages | 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-type-${{ hashFiles('math-anything/pyproject.toml') }}

      - name: Install package and mypy | 安装依赖与类型检查工具
        run: |
          python -m pip install --upgrade pip
          pip install -e "math-anything/[dev]"

      - name: Run mypy | 运行类型检查
        working-directory: math-anything
        run: mypy math_anything/ --ignore-missing-imports --show-error-codes || true

  test:
    name: Test | 测试 (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      # Disable Hypothesis deadlines to avoid flakiness on slower Windows runners
      HYPOTHESIS_DEADLINE: None
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} | 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages | 缓存 pip
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '~/AppData/Local/pip/Cache' || '~/.cache/pip' }}
          key: ${{ runner.os }}-${{ matrix.python-version }}-pip-${{ hashFiles('math-anything/pyproject.toml') }}

      - name: Install dependencies | 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e "math-anything/[dev]"

      - name: Verify package import | 验证包导入
        run: python -c "import math_anything; print('math_anything OK, version:', math_anything.__version__)"

      - name: Run unit tests | 运行单元测试
        working-directory: math-anything
        shell: bash
        run: |
          set -o pipefail
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Coverage on Windows runners can cause flaky hypothesis deadlines
            pytest tests/unit/ -v --tb=short --no-cov 2>&1 | tee pytest-unit.log
          else
            pytest tests/unit/ -v --tb=short --cov-report=xml 2>&1 | tee pytest-unit.log
          fi

      - name: Upload unit test log on failure | 失败时上传单元测试日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-unit-log-${{ matrix.os }}-${{ matrix.python-version }}
          path: math-anything/pytest-unit.log

      - name: Post failure tail to commit | 将失败日志提交到 commit comment
        if: failure() && runner.os == 'Windows'
        working-directory: math-anything
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PY_VERSION: ${{ matrix.python-version }}
        run: |
          python - <<'PY'
          import json, os, sys, urllib.request
          try:
              tail = open('pytest-unit.log', encoding='utf-8', errors='replace').read()[-3500:]
          except FileNotFoundError:
              sys.exit(0)
          body = (
              f"Windows {os.environ.get('PY_VERSION')} unit-test failure tail:\n\n"
              f"```\n{tail}\n```"
          )
          repo = os.environ['GITHUB_REPOSITORY']
          sha = os.environ['GITHUB_SHA']
          url = f"https://api.github.com/repos/{repo}/commits/{sha}/comments"
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              url,
              data=data,
              headers={
                  "Authorization": f"token {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              urllib.request.urlopen(req)
          except Exception as e:
              print("Could not post failure tail:", e)
          PY

      - name: Check coverage threshold | 检查覆盖率阈值
        if: matrix.os != 'windows-latest'
        working-directory: math-anything
        run: coverage report --fail-under=50

      - name: Run integration tests | 运行集成测试
        working-directory: math-anything
        run: pytest tests/integration/ -v --tb=short

      - name: Run regression tests | 运行回归测试
        working-directory: math-anything
        run: pytest tests/regression/ -v --tb=short

      - name: Upload coverage | 上传覆盖率
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./math-anything/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan | 安全扫描
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Set up Python | 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies | 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit
          pip install -e "math-anything/[dev]" || pip install -e math-anything/

      - name: Run bandit | 运行 bandit
        run: bandit -r math-anything/math_anything/ -f json -o bandit-report.json || true

      - name: Run pip-audit | 运行 pip-audit
        run: pip-audit --desc || true

      - name: Run safety check | 运行 safety 检查
        run: safety check || true

      - name: Upload bandit report | 上传安全报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

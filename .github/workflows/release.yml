name: Release | 自动发布

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Pre-release Test | 发布前测试
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Set up Python | 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies | 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests | 运行测试
        run: pytest -v

  build-pypi:
    name: Build PyPI Package | 构建 PyPI 包
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Set up Python | 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools | 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package | 构建包
        run: python -m build

      - name: Check package | 检查包
        run: twine check dist/*

      - name: Upload artifacts | 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/

  build-tauri:
    name: Build Tauri Desktop | 构建桌面端 (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Set up Python | 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies | 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Set up Node.js | 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust | 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies | 安装 Linux 依赖
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build sidecar | 构建 Python sidecar
        run: python build.py --target sidecar

      - name: Install frontend dependencies | 安装前端依赖
        working-directory: math-anything-app
        run: npm install

      - name: Build Tauri app | 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: math-anything-app
          tagName: ${{ github.ref_name }}
          releaseName: "Math Anything ${{ github.ref_name }}"
          releaseBody: "Desktop application for mathematical structure extraction"
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Upload Tauri artifacts | 上传桌面端产物
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            math-anything-app/src-tauri/target/release/bundle/
            math-anything-app/src-tauri/target/release/bundle/msi/*.msi
            math-anything-app/src-tauri/target/release/bundle/dmg/*.dmg
            math-anything-app/src-tauri/target/release/bundle/deb/*.deb
            math-anything-app/src-tauri/target/release/bundle/appimage/*.AppImage

  github-release:
    name: GitHub Release | GitHub 发布
    needs: [build-pypi, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4

      - name: Download PyPI artifacts | 下载 PyPI 产物
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/

      - name: Generate changelog | 生成更新日志
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release | 创建发布
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          body: |
            ## 更新日志 | Changelog

            ${{ steps.changelog.outputs.changelog }}

            ## 安装 | Installation

            ### Python Package
            ```bash
            pip install math-anything==${{ github.ref_name }}
            ```

            ### Desktop Application
            Download the installer for your platform from the assets below.

            ## 双平台仓库 | Dual Platform

            - GitHub: https://github.com/toki0413/math-anything
            - Gitee: https://gitee.com/crested-ibis-0413/math-anything
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi-publish:
    name: Publish to PyPI | 发布到 PyPI
    needs: build-pypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/math-anything
    permissions:
      id-token: write
    steps:
      - name: Download artifacts | 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI | 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  sync-gitee:
    name: Sync to Gitee | 同步到 Gitee
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout | 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Gitee | 同步到 Gitee
        uses: wearerequired/git-mirror-action@v1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_KEY }}
        with:
          source-repo: "git@github.com:toki0413/math-anything.git"
          destination-repo: "git@gitee.com:crested-ibis-0413/math-anything.git"

      - name: Create Gitee Release | 创建 Gitee 发布
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "${{ github.ref_name }}",
              "name": "Release ${{ github.ref_name }}",
              "body": "自动同步自 GitHub Release",
              "target_commitish": "main"
            }' \
            https://gitee.com/api/v5/repos/crested-ibis-0413/math-anything/releases
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
